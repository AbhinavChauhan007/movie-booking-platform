# ---------------------------
# Application Name
# ---------------------------
spring.application.name=booking-service

# ---------------------------
# Datasource / PostGreSQL
# ---------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/movie_booking?options=-c%20timezone=Asia/Kolkata
spring.datasource.username=movie_user
spring.datasource.password=movie_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ---------------------------
# JPA / Hibernate
# ---------------------------
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ---------------------------
# Flyway Migration
# ---------------------------
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:/db/migration

# ---------------------------
# gRPC server
# ---------------------------
grpc.server.port=9090

# ---------------------------
# gRPC clients
# ---------------------------
grpc.client.seat-service.address=static://localhost:9090
grpc.client.seat-service.negotiationType=plaintext
grpc.client.pricing-service.address=static://localhost:9090
grpc.client.pricing-service.negotiationType=plaintext

# ---------------------------
# Redis
# ---------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379

# ---------------------------
# Kafka Configuration
# ---------------------------
spring.kafka.bootstrap-servers=localhost:9092

# ---------------------------
# Producer Configuration
# ---------------------------
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.retries=3

# ---------------------------
# Consumer Configuration
# ---------------------------
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# ---------------------------
# Topic Configuration
# ---------------------------
kafka.topic.booking-events=booking-events
kafka.topic.booking-events-dlq=booking-events-dlq

# ---------------------------
# Kafka Admin Configuration (for topic creation)
# ---------------------------
spring.kafka.admin.auto-create=false
spring.kafka.admin.fail-fast=false

# ---------------------------
# Kafka Listener Configuration
# ---------------------------
spring.kafka.listener.ack-mode=manual
spring.kafka.listener.concurrency=3

# ---------------------------
# JSON Serialization
# ---------------------------
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# ---------------------------
# Error Handling & Logging
# ---------------------------
# Show full error messages
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=true

# Logging levels
logging.level.root=INFO
logging.level.com.abhinav.moviebooking=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Console logging pattern (easier to read)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ---------------------------
# Swagger/OpenAPI Configuration
# ---------------------------
springdoc.api-docs.enabled=true
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=false
springdoc.swagger-ui.syntaxHighlight.activated=true
